name: Mutation testing

# Thin caller of the shared mutation-testing reusable workflow; caller
# guide: leynos/shared-actions docs/mutation-mutmut-workflow.md.
on:
  schedule:
    - cron: "50 7 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation:
    permissions:
      contents: read
      id-token: write # OIDC workflow-source resolution
    uses: leynos/shared-actions/.github/workflows/mutation-mutmut.yml@4977418856133491c6aa7407d40668744df21818
    with:
      paths: "ghillie/"
      module-prefix-strip: ""
