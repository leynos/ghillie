name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # `cs-coverage check` (added in a follow-up once CodeScene's
          # gates configuration is available for this project) diffs the
          # PR against its merge base, so full history must stay
          # reachable; this matches CodeScene's documented example.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install yaml schema validator
        run: bun install -g pajv

      - name: Install CLI tools
        run: |
          for tool in mbake ruff; do uv tool install ${tool}; done
          npm install -g markdownlint-cli2

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Check spelling
        run: make spelling

      - name: Run architecture and lint checks
        run: make lint

      - name: Run typechecker
        run: make typecheck

      # Coverage is generated here only for pull requests; coverage-main.yml
      # generates and uploads the authoritative main-branch coverage on
      # push, so a push-triggered run of this job would otherwise generate
      # coverage twice for the same commit.
      - name: Generate coverage
        if: github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: cobertura
          output-path: coverage.xml
          with-ratchet: 'true'

      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@4977418856133491c6aa7407d40668744df21818
        with:
          format: cobertura
          mode: check
          project-url: https://api.codescene.io/v2/projects/74419
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

      - name: Run tests
        if: github.event_name != 'pull_request'
        run: uv run pytest -v -n auto
